<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 🔥 PRIMARY SEO -->
    <title>Windows Learning | Learn. Connect. Grow</title>

    <meta 
      name="description" 
      content="Windows Learning is a modern platform where learners connect with verified mentors, book live sessions, and accelerate skill growth. Mentors monetize their expertise through sessions and proposals." 
    />

    <meta 
      name="keywords" 
      content="online learning platform, mentorship platform, book mentor sessions, skill development, verified mentors, live learning, freelancing skills, mentor marketplace" 
    />

    <meta name="author" content="Windows Learning" />

    <!-- ✅ INDEXING CONTROL -->
    <meta name="robots" content="index, follow" />

    <!-- 🌐 CANONICAL (CRITICAL FOR SEO) -->
    <link rel="canonical" href="https://windowslearning.com/" />

    <!-- 🌐 OPEN GRAPH -->
    <meta property="og:title" content="Windows Learning | Learn from Experts" />
    <meta 
      property="og:description" 
      content="Discover mentors, book sessions, and accelerate your learning journey with Windows Learning." 
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://windowslearning.com/" />
    <meta property="og:image" content="https://windowslearning.com/og-image.png" />
    <meta property="og:site_name" content="Windows Learning" />

    <!-- 🐦 TWITTER -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Windows Learning Platform" />
    <meta 
      name="twitter:description" 
      content="Book sessions with mentors, post requirements, and grow your career." 
    />
    <meta name="twitter:image" content="https://windowslearning.com/og-image.png" />

    <!-- ⚡ PERFORMANCE -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- 🧠 PWA + BRANDING -->
    <meta name="theme-color" content="#0f172a" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- 📊 STRUCTURED DATA (SEO BOOST) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Windows Learning",
        "url": "https://windowslearning.com",
        "logo": "https://windowslearning.com/logo.png",
        "sameAs": [
          "https://twitter.com/",
          "https://linkedin.com/"
        ]
      }
    </script>

  </head>

  <body>
    <div id="root"></div>

    <!-- 🚀 APP ENTRY -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
